<section class="page-panel card shadow-sm border-0">
  <div class="card-body py-4">
    <h1 class="h3 mb-4">Sign in</h1>
    <div data-login-status class="mb-3"></div>
    <form data-login-form class="row g-3">
      <div class="col-12">
        <label class="form-label" for="login-email">Email</label>
        <input id="login-email" name="email" type="email" class="form-control" required />
      </div>
      <div class="col-12">
        <label class="form-label" for="login-password">Password</label>
        <input id="login-password" name="password" type="password" class="form-control" required />
      </div>
      <div class="col-12">
        <button type="submit" class="btn btn-primary">Sign in</button>
      </div>
    </form>
  </div>
</section>
